name: Windows Release

# Builds the Windows NSIS installer for a tagged commit and attaches it to
# the GitHub release. Tag the commit with a v-prefixed semver (e.g. v0.32.0)
# to fire automatically, or trigger from the Actions tab with workflow_dispatch
# and supply an existing tag.
#
# The build step mirrors the windows-build job in windows.yml. The publish
# step adds the .exe to a release (created or updated) with auto-generated
# notes when one doesn't already exist.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and publish (e.g. v0.32.0)"
        required: true
        type: string
      draft:
        description: "Publish the release as a draft"
        required: false
        default: false
        type: boolean

concurrency:
  group: windows-release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CI: true

jobs:
  windows-release:
    name: Build + publish Windows NSIS installer
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      # src-tauri/.cargo/config.toml sets rustc-wrapper = "sccache" for the
      # macOS jobs; Windows runners don't install it, so clear the wrapper.
      RUSTC_WRAPPER: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js
        with:
          install-sccache: "false"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # boring-sys2 (transitive native dep) assembles with NASM on Windows.
      - name: Setup NASM
        uses: ilammy/setup-nasm@v1

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: windows-tauri-v1
          workspaces: src-tauri -> target

      # tauri build's beforeBuildCommand runs prepare-sidecar.mjs, which stages
      # the win32 vendor tree, builds the bun sidecar + helmor-cli, then bundles.
      - name: Build Windows installer (NSIS)
        shell: bash
        run: bun x tauri build --bundles nsis

      - name: Publish installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: src-tauri/target/release/bundle/nsis/*-setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: ${{ github.event.inputs.draft || false }}
