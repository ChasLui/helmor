name: Windows

# Windows is a SECOND supported platform for this fork (macOS remains the
# upstream reference). The upstream macOS suites live in test.yml / build.yml /
# quality.yml and run on macos-latest; this workflow mirrors the
# platform-sensitive parts on windows-latest so the Windows adapter code
# (process/fs/paths/executable boundaries, the `.cmd` CLI shim, bundled-binary
# resolution, and the win32 vendor staging) keeps building, testing, and
# bundling on every change.

on:
  pull_request:
  push:
    branches:
      - main
      - windows-port

concurrency:
  group: windows-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CI: true

jobs:
  windows-typecheck:
    name: Windows Typecheck
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js
        with:
          # sccache is unused by the Windows jobs and its installer is flaky
          # on Windows runners; skip it.
          install-sccache: "false"

      # Covers the win32 branches added to sidecar/scripts/vendor-platform.ts
      # and the frontend, neither of which the macOS typecheck exercises with
      # `process.platform === "win32"`.
      - name: Run typecheck
        shell: bash
        run: bun run typecheck

  windows-sidecar-test:
    name: Windows Sidecar Test
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js
        with:
          # sccache is unused by the Windows jobs and its installer is flaky
          # on Windows runners; skip it.
          install-sccache: "false"

      - name: Run sidecar tests
        shell: bash
        run: bun run test:sidecar

  windows-rust-test:
    name: Windows Rust Test
    runs-on: windows-latest
    timeout-minutes: 40
    env:
      # src-tauri/.cargo/config.toml sets rustc-wrapper = "sccache" for the
      # macOS jobs (where setup-rust-tauri installs sccache). Override it
      # back to empty on Windows so cargo doesn't try to invoke a binary
      # that isn't on PATH.
      RUSTC_WRAPPER: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js
        with:
          # sccache is unused by the Windows jobs and its installer is flaky
          # on Windows runners; skip it.
          install-sccache: "false"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # boring-sys2 (transitive native dep) assembles with NASM on Windows;
      # the runner ships Perl (Strawberry) but not NASM.
      - name: Setup NASM
        uses: ilammy/setup-nasm@v1

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: windows-tauri-v1
          workspaces: src-tauri -> target

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      # The crate compile needs `sidecar/dist/vendor/` (a Tauri bundle resource)
      # to exist; build.rs stubs the externalBin placeholders. On Windows this
      # stages the win32 vendor tree (see vendor-platform.ts).
      - name: Stage sidecar vendor tree
        shell: bash
        run: cd sidecar && bun install --frozen-lockfile && bun run build

      - name: Run Rust tests with nextest
        shell: bash
        run: cd src-tauri && cargo nextest run

      - name: Run Rust doctests
        shell: bash
        run: cd src-tauri && cargo test --doc

  windows-build:
    name: Windows Build
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      # See windows-rust-test above.
      RUSTC_WRAPPER: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js
        with:
          # sccache is unused by the Windows jobs and its installer is flaky
          # on Windows runners; skip it.
          install-sccache: "false"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup NASM
        uses: ilammy/setup-nasm@v1

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: windows-tauri-v1
          workspaces: src-tauri -> target

      - name: Cache bundle archives
        uses: ./.github/actions/cache-bundle-archives
        with:
          target-triple: x86_64-pc-windows-msvc

      # `tauri build`'s beforeBuildCommand runs prepare-sidecar.mjs, which stages
      # the win32 vendor tree, builds the bun sidecar + helmor-cli, then bundles.
      # NSIS only — WiX/MSI is not part of what this fork ships.
      - name: Build Windows installer (NSIS)
        shell: bash
        run: bun x tauri build --bundles nsis

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: helmor-windows-x64-setup
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
          retention-days: 14
