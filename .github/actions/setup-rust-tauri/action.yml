name: Setup Rust Tauri
description: Setup Rust toolchain, Rust cache, and per-OS system packages for Tauri builds

runs:
  using: composite
  steps:
    - name: Configure sccache env
      shell: bash
      run: |
        echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
        # Incremental + sccache fight each other: incremental fingerprints
        # are host-local and invalidate sccache lookups, so sccache never
        # hits. Disable incremental in CI only (actions/cache-via-this-env
        # step persists this for subsequent steps in the same job).
        echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust artifacts
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        cache-workspace-crates: true
        shared-key: ${{ runner.os == 'Linux' && 'linux-tauri-v1' || (runner.os == 'Windows' && 'windows-tauri-v1' || 'macos-tauri-v1') }}
        workspaces: src-tauri -> target

    # Persist sccache's default per-OS object cache. Complements
    # Swatinem/rust-cache (which handles target/) by covering build
    # scripts and any recompile that changes the Cargo fingerprint but
    # leaves individual rustc invocations identical.
    - name: Cache sccache objects (Linux)
      if: runner.os == 'Linux'
      uses: actions/cache@v4
      with:
        path: ~/.cache/sccache
        key: sccache-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
        restore-keys: sccache-linux-

    - name: Cache sccache objects (macOS)
      if: runner.os == 'macOS'
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/Mozilla.sccache
        key: sccache-macos-${{ hashFiles('src-tauri/Cargo.lock') }}
        restore-keys: sccache-macos-

    - name: Cache sccache objects (Windows)
      if: runner.os == 'Windows'
      uses: actions/cache@v4
      with:
        path: ~/AppData/Local/Mozilla/sccache/cache
        key: sccache-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
        restore-keys: sccache-windows-

    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest

    - name: Install Linux system packages
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libsoup-3.0-dev \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libxdo-dev \
          patchelf
